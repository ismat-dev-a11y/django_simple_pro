<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <title>Notes</title>
</head>
<body class="bg-light">

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">My Notes</span>

    <div class="d-flex align-items-center ms-auto">
        <span class="text-white me-3">
            {{ user.username }}
        </span>


        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
            Logout
        </a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Table -->
    <table class="table table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Notes</th>
                <th colspan="3">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for note in notes %}
            <tr class="{% cycle 'table-primary' 'table-success' 'table-warning' 'table-info' %}">
                <td>{{ forloop.counter }}</td>  <!-- FIX -->
                <td>{{ note }}</td>
                <td><a href="{% url 'notes:update' note.pk %}">Update</a></td>
                <td><a href="{% url 'notes:delete' note.pk %}">Delete</a></td>
                <td><a href="{% url 'notes:detail' note.pk %}">Detail</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <!-- Create button -->
    <a href="{% url 'notes:create' %}" class="btn btn-primary">
        + Create Note
    </a>
    <a href="{% url 'notes:all-notes' %}" class="btn btn-primary">
        All Notes
    </a>

</div>

</body>
</html>
