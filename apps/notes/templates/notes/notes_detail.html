<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Detail</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg rounded-4">
        <div class="card-body">

            <!-- Title -->
            <h2 class="card-title text-primary mb-3">
                {{ note.title }}
            </h2>

            <!-- Content -->
            <p class="card-text fs-5 text-muted">
                {{ note.content }}
            </p>

            <hr>

            <!-- Buttons -->
            <div class="d-flex gap-2">

                <a href="{% url 'notes:update' note.id %}" class="btn btn-warning">
                    ✏️ Update
                </a>

                <a href="{% url 'notes:delete' note.id %}" class="btn btn-danger">
                    🗑 Delete
                </a>

                <a href="{% url 'notes:notes' %}" class="btn btn-secondary ms-auto">
                    ⬅ Back
                </a>

            </div>

        </div>
    </div>

</div>

</body>
</html>
