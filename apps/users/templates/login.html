<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h2 {
            color: white;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #2575fc;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #2575fc;
            color: white;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #ffcccc;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>

        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}
                <div class="error-msg">Invalid username or password.</div>
            {% endif %}

            {{ form.as_p }}

            <button type="submit">LOGIN</button>
        </form>
        <h4>Don't have an account?</h4><a href="{% url 'register' %}">Register</a>
    </div>

</body>
</html>
