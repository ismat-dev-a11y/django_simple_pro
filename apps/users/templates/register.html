<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create an Account</title>
    <style>
        .register-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: sans-serif;
        }
        /* Style the Django {{ form.as_p }} paragraphs */
        .register-container p {
            margin-bottom: 15px;
        }
        .register-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .register-container input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box; /* Prevents input from overflowing */
        }
        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .errorlist { color: red; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Sign Up</h2>
    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn-submit">Register</button>
    </form>

    <p style="font-size: 0.8em; text-align: center;">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
</div>

</body>
</html>
